services:
  # The NestHub Web Service (Backend + Frontend for Web)
  - type: web
    name: nesthub
    env: node
    plan: free # Can be changed to 'starter' for more power
    buildCommand: npm install && npm run build
    preDeployCommand: npm run db:push
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nesthub-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID_WEB
        sync: false # Set this in the Render Dashboard
      - key: GOOGLE_CLIENT_ID_IOS
        sync: false # Set this in the Render Dashboard

databases:
  # The NestHub PostgreSQL Database
  - name: nesthub-db
    plan: free # Free tier expires after 30 days on Render, consider 'starter' for production
    databaseName: nesthub
    user: jerome
